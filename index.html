<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fff7ef">
  <title>memo</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main id="authPanel" class="auth-panel hidden">
    <h1 data-i18n="appTitle">memo</h1>
    <p data-i18n="authHint">不登录也能本地使用；登录后可在电脑和手机之间同步。</p>
    <label>
      <span data-i18n="email">邮箱</span>
      <input id="emailInput" type="email" autocomplete="email" placeholder="you@example.com">
    </label>
    <label>
      <span data-i18n="password">密码</span>
      <input id="passwordInput" type="password" autocomplete="current-password" data-i18n-placeholder="passwordPlaceholder" placeholder="至少 6 位">
    </label>
    <div class="auth-actions">
      <button id="signInButton" data-i18n="login" type="button">登录</button>
      <button id="signUpButton" data-i18n="register" type="button">注册</button>
      <button id="localUseButton" data-i18n="localUse" type="button">先本地使用</button>
    </div>
  </main>

  <main id="appPanel" class="shell hidden">
    <header class="topbar">
      <button id="pinButton" class="pin active" title="置顶标记" type="button" aria-label="置顶标记"></button>
      <div id="dateLabel" class="date-label"></div>
      <nav class="tabs" aria-label="主导航">
        <button class="tab active" data-view="todos" data-i18n="tabTodos" type="button">待办</button>
        <button class="tab" data-view="reminders" data-i18n="tabReminders" type="button">提醒</button>
        <button class="tab" data-view="notes" data-i18n="tabNotes" type="button">便签</button>
        <button class="tab" data-view="diary" data-i18n="tabDiary" type="button">日记</button>
        <button class="tab" data-view="ledger" data-i18n="tabLedger" type="button">记账</button>
        <button class="tab" data-view="recipes" data-i18n="tabRecipes" type="button">菜谱</button>
        <button class="tab" data-view="history" data-i18n="tabHistory" type="button">历史</button>
        <button class="tab" data-view="settings" data-i18n="tabSettings" type="button">设置</button>
      </nav>
      <button id="signOutButton" class="mini-button" type="button">退出</button>
    </header>

    <section class="account-bar">
      <span id="userLabel"></span>
      <button id="exportButton" data-i18n="export" type="button">导出</button>
      <label class="import-button">
        <span data-i18n="import">导入</span>
        <input id="importInput" type="file" accept="application/json">
      </label>
    </section>

    <section id="content" class="content" aria-live="polite"></section>

    <section id="notePanel" class="note-panel hidden">
      <div class="note-editor">
        <input id="noteTitleInput" class="note-title-input" type="text" data-i18n-placeholder="noteTitlePlaceholder" placeholder="便签标题">
        <textarea id="noteInput" spellcheck="false" data-i18n-placeholder="notePlaceholder" placeholder="写点什么吧 ( ・・)✎__"></textarea>
      </div>
      <aside id="noteSidebar" class="note-sidebar">
        <div id="noteList" class="note-list"></div>
        <button id="noteAddButton" class="note-tool-button" type="button">＋</button>
        <button id="noteDeleteButton" class="note-tool-button note-delete-button" type="button">删除</button>
        <button id="noteToggleButton" class="note-tool-button" type="button">收起</button>
      </aside>
      <button id="noteExpandButton" class="note-expand hidden" type="button">⌃</button>
    </section>

    <section id="diaryPanel" class="note-panel diary-panel hidden">
      <div class="diary-toolbar">
        <input id="diaryDateInput" type="date">
      </div>
      <textarea id="diaryInput" spellcheck="false" data-i18n-placeholder="diaryPlaceholder" placeholder="今天想记录点什么 ( ・・)✎__"></textarea>
    </section>

    <footer id="commandBar" class="command-bar">
      <form id="commandForm" class="command-form" autocomplete="off">
        <input id="commandInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text" enterkeyhint="send" data-i18n-placeholder="placeholder" placeholder="写点什么吧 ( ・・)✎__">
      </form>
      <select id="commandTimerSelect" class="command-timer" tabindex="-1" aria-label="中途提醒">
        <option value="0">中途：无</option>
        <option value="60">1h</option>
        <option value="120">2h</option>
        <option value="240">4h</option>
        <option value="480">8h</option>
      </select>
    </footer>

  </main>

  <div id="status" class="status" role="status"></div>

  <div id="welcomeModal" class="modal hidden" role="dialog" aria-modal="true">
    <section class="modal-card welcome-card">
      <h2 id="welcomeTitle"></h2>
      <p id="welcomeText"></p>
      <div class="modal-actions">
        <button id="welcomeCloseButton" data-i18n="enterTodos" type="button">进入待办</button>
      </div>
    </section>
  </div>

  <div id="alarmModal" class="modal hidden" role="alertdialog" aria-modal="true">
    <section class="modal-card alarm-card">
      <div class="alarm-badge" data-i18n="alarmBadge">到点了</div>
      <h2 id="alarmTitle" data-i18n="alarmTitle">待办提醒</h2>
      <p id="alarmText"></p>
      <div class="modal-actions">
        <button id="alarmDoneButton" data-i18n="alarmDone" type="button">今日完成</button>
        <button id="alarmCloseButton" data-i18n="alarmClose" type="button">知道了</button>
      </div>
    </section>
  </div>

  <div id="helpModal" class="modal hidden" role="dialog" aria-modal="true">
    <section class="modal-card help-card">
      <h2 id="helpTitle">待办使用说明</h2>
      <div id="helpBody" class="help-body"></div>
      <div class="modal-actions">
        <button id="helpCloseButton" type="button">知道了</button>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
